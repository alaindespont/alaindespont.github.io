<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Stock Manager</title>
    <link rel="stylesheet" href="styles.css?v=3">
  </head>
  <body>
    <header class="app-header">
      <div class="app-brand">
        <a
          class="home-assistant-link"
          href="http://10.0.20.3:8123"
          target="_top"
          aria-label="Ouvrir Home Assistant"
          title="Ouvrir Home Assistant"
        >
          <svg class="home-assistant-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2.25 2.5 10v11.25h7v-6.5h5v6.5h7V10L12 2.25Z" fill="currentColor"/>
            <path d="M8.4 10.2a1.55 1.55 0 1 1 3.1 0 1.55 1.55 0 0 1-3.1 0Zm4.1 3.6a1.55 1.55 0 1 1 3.1 0 1.55 1.55 0 0 1-3.1 0Z" fill="#ffffff"/>
            <path d="M10 11.15 13.9 13" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </a>

        <div>
          <h1>STOCKS</h1>
          <p id="stockSummary" class="stock-summary"></p>
        </div>
      </div>
      <output id="saveStatus" class="save-status" aria-live="polite">Chargement</output>
    </header>

    <main class="app-shell">
      <section class="tools-band" aria-label="Outils stock">
        <div class="field-group search-field">
          <label for="searchInput">Recherche</label>
          <input id="searchInput" type="search" autocomplete="off" placeholder="Objet ou date">
        </div>
        <div class="field-group">
          <label for="categoryFilter">Catégorie</label>
          <select id="categoryFilter">
            <option value="">Toutes</option>
          </select>
        </div>
        <div class="toolbar-actions">
          <button id="addItemButton" class="primary-button" type="button">Ajouter un objet</button>
          <button id="addCategoryButton" class="secondary-button" type="button">Ajouter une catégorie</button>
        </div>
      </section>

      <section class="content-grid">
        <section class="stock-table-section" aria-label="Inventaire">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Catégorie</th>
                  <th>Date limite</th>
                  <th>Objet</th>
                  <th>Souhaité</th>
                  <th>Restant</th>
                  <th>Solde</th>
                  <th>Dernier contrôle</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="itemsBody"></tbody>
            </table>
          </div>
          <p id="emptyState" class="empty-state" hidden>Aucun objet trouvé.</p>
        </section>

        <aside class="shopping-panel" aria-label="Liste de courses">
          <div class="panel-header">
            <h2>Liste de courses</h2>
            <button id="printListButton" class="secondary-button" type="button">Imprimer</button>
          </div>
          <textarea id="shoppingList" readonly spellcheck="false"></textarea>
          <pre id="printShoppingList" class="print-shopping-list"></pre>
          <p id="printStatus" class="panel-status" aria-live="polite"></p>
        </aside>
      </section>

      <section class="category-section" aria-label="Catégories">
        <div class="section-heading">
          <h2>Catégories</h2>
        </div>
        <div id="categoryEditor" class="category-editor"></div>
      </section>
    </main>

    <dialog id="itemDialog" class="item-dialog">
      <form id="itemForm" class="item-form">
        <div class="dialog-header">
          <h2>Ajouter un objet</h2>
          <button id="closeItemDialogButton" class="icon-button" type="button" aria-label="Fermer">x</button>
        </div>

        <div class="dialog-grid">
          <div class="field-group">
            <label for="newItemCategory">Catégorie</label>
            <select id="newItemCategory" name="category" required></select>
          </div>
          <div class="field-group">
            <label for="newItemName">Objet</label>
            <input id="newItemName" name="name" type="text" required autocomplete="off">
          </div>
          <div class="field-group">
            <label for="newItemExpiry">Date limite</label>
            <select id="newItemExpiry" name="expiry">
              <option value=""></option>
              <option value="Infini">Infini</option>
              <option value="6 mois">6 mois</option>
              <option value="1 année">1 année</option>
              <option value="2 ans">2 ans</option>
              <option value="10 ans">10 ans</option>
            </select>
          </div>
          <div class="field-group">
            <label for="newItemTarget">Quantité souhaitée</label>
            <input id="newItemTarget" name="targetQuantity" type="number" min="0" step="1" value="1" required>
          </div>
          <div class="field-group">
            <label for="newItemCurrent">Quantité restante</label>
            <input id="newItemCurrent" name="currentQuantity" type="number" min="0" step="1" value="0" required>
          </div>
        </div>

        <div class="dialog-actions">
          <button id="cancelItemButton" class="secondary-button" type="button">Annuler</button>
          <button class="primary-button" type="submit">Créer</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
