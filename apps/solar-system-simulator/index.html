<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Solarsystem simulator</title>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

	<!-- ORIGINAL IDEA : Codecademy – “Sun, Earth, and Code -->
	<header class="app-header">
		<h1>Solarsystem simulator</h1>

		<div class="header-actions">
			<div class="language-control" id="languageControl" aria-label="Langue">
				<button class="language-button is-active" type="button" data-language="fr" aria-pressed="true">Francais</button>
				<button class="language-button" type="button" data-language="en" aria-pressed="false">Anglais</button>
			</div>

			<button class="header-action" id="recenterView" type="button">Recentrer</button>

			<div class="zoom-controls" aria-label="Controle du zoom">
				<button class="icon-button" id="zoomOut" type="button" aria-label="Dezoomer">-</button>
				<span id="zoomValue">100%</span>
				<button class="icon-button" id="zoomIn" type="button" aria-label="Zoomer">+</button>
			</div>

			<button class="icon-button menu-toggle" id="menuToggle" type="button" aria-label="Ouvrir le menu" aria-controls="objectPanel" aria-expanded="false">
				<span></span>
				<span></span>
				<span></span>
			</button>
		</div>
	</header>

	<aside class="object-panel" id="objectPanel" aria-hidden="true">
		<div class="panel-heading">
			<h2 id="panelTitle">Objets</h2>
			<button class="panel-close" id="closePanel" type="button" aria-label="Fermer le menu">x</button>
		</div>

		<div class="speed-control">
			<div class="control-row">
				<label id="speedLabel" for="speedRange">Vitesse simulation</label>
				<span id="speedValue">x1</span>
			</div>
			<input id="speedRange" type="range" min="1" max="50" step="1" value="1">
		</div>

		<div class="object-list" id="objectList"></div>
	</aside>

	<main class="space-viewport" aria-label="Simulation du systeme solaire">
		<div class="solar-system" id="solarSystem">
			<img class="kuiper sim-object" data-object="kuiper" src="img/kuiper_belt.png" alt="">
			<img class="asteroids_troyens sim-object" data-object="asteroids_troyens" src="img/asteroids_troyens.png" alt="">
			<img class="asteroids_belt sim-object" data-object="asteroids_belt" src="img/asteroids_belt.png" alt="">
			<img class="soleil sim-object" data-object="soleil" src="img/soleil.png" alt="">

			<div class="mercure-orbit">
				<img class="mercure sim-object" data-object="mercure" src="img/mercure.png" alt="">
			</div>

			<div class="venus-orbit">
				<img class="venus sim-object" data-object="venus" src="img/venus.png" alt="">
			</div>

			<div class="terre-orbit">
				<div class="lune-orbit">
					<img class="lune sim-object" data-object="lune" src="img/lune.png" alt="">
				</div>
				<img class="terre sim-object" data-object="terre" src="img/terre.png" alt="">
			</div>

			<div class="mars-orbit">
				<div class="phobos-orbit">
					<img class="phobos sim-object" data-object="phobos" src="img/lune.png" alt="">
				</div>
				<div class="deimos-orbit">
					<img class="deimos sim-object" data-object="deimos" src="img/lune.png" alt="">
				</div>
				<img class="mars sim-object" data-object="mars" src="img/mars.png" alt="">
			</div>

			<div class="jupiter-orbit">
				<div class="ganymede-orbit">
					<img class="ganymede sim-object" data-object="ganymede" src="img/lune.png" alt="">
				</div>
				<div class="callisto-orbit">
					<img class="callisto sim-object" data-object="callisto" src="img/lune.png" alt="">
				</div>
				<div class="io-orbit">
					<img class="io sim-object" data-object="io" src="img/lune.png" alt="">
				</div>
				<div class="europe-orbit">
					<img class="europe sim-object" data-object="europe" src="img/lune.png" alt="">
				</div>
				<img class="jupiter sim-object" data-object="jupiter" src="img/jupiter.png" alt="">
			</div>

			<div class="saturne-orbit">
				<div class="titan-orbit">
					<img class="titan sim-object" data-object="titan" src="img/lune.png" alt="">
				</div>
				<div class="rhea-orbit">
					<img class="rhea sim-object" data-object="rhea" src="img/lune.png" alt="">
				</div>
				<div class="japet-orbit">
					<img class="japet sim-object" data-object="japet" src="img/lune.png" alt="">
				</div>
				<div class="dione-orbit">
					<img class="dione sim-object" data-object="dione" src="img/lune.png" alt="">
				</div>
				<div class="thetys-orbit">
					<img class="thetys sim-object" data-object="thetys" src="img/lune.png" alt="">
				</div>
				<img class="saturne sim-object" data-object="saturne" src="img/saturne.png" alt="">
			</div>

			<div class="uranus-orbit">
				<div class="titania-orbit">
					<img class="titania sim-object" data-object="titania" src="img/lune.png" alt="">
				</div>
				<div class="oberon-orbit">
					<img class="oberon sim-object" data-object="oberon" src="img/lune.png" alt="">
				</div>
				<div class="umbriel-orbit">
					<img class="umbriel sim-object" data-object="umbriel" src="img/lune.png" alt="">
				</div>
				<div class="ariel-orbit">
					<img class="ariel sim-object" data-object="ariel" src="img/lune.png" alt="">
				</div>
				<img class="uranus sim-object" data-object="uranus" src="img/uranus.png" alt="">
			</div>

			<div class="neptune-orbit">
				<div class="triton-orbit">
					<img class="triton sim-object" data-object="triton" src="img/lune.png" alt="">
				</div>
				<img class="neptune sim-object" data-object="neptune" src="img/neptune.png" alt="">
			</div>

			<div class="pluton-orbit">
				<div class="charon-orbit">
					<img class="charon sim-object" data-object="charon" src="img/lune.png" alt="">
				</div>
				<img class="pluton sim-object" data-object="pluton" src="img/lune.png" alt="">
			</div>
		</div>
	</main>

	<div class="selection-overlay" id="selectionOverlay" hidden>
		<div class="selection-line" id="selectionLine"></div>
		<div class="selection-marker" id="selectionMarker"></div>
		<div class="selection-label" id="selectionLabel"></div>
	</div>

	<script src="script.js"></script>
</body>
</html>
