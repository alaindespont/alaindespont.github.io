<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Alain Philip Despont | Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

  <div class="header-top">
    <div>
      <h1 data-fr="Alain Philip Despont" data-en="Alain Philip Despont"></h1>
      <p class="subtitle"
         data-fr="Scripts, outils et projets techniques"
         data-en="Scripts, tools and technical projects"></p>
    </div>

<div class="lang-switch">

  <!-- FR -->
  <button data-lang="fr" class="flag-btn" title="Francais">
    <svg viewBox="0 0 3 2" width="32" height="20" aria-hidden="true">
      <rect width="1" height="2" x="0" fill="#0055A4"/>
      <rect width="1" height="2" x="1" fill="#FFFFFF"/>
      <rect width="1" height="2" x="2" fill="#EF4135"/>
    </svg>
  </button>

  <!-- EN -->
  <button data-lang="en" class="flag-btn" title="English">
    <svg viewBox="0 0 60 30" width="32" height="20" aria-hidden="true">
      <rect width="60" height="30" fill="#012169"/>
      <polygon points="0,0 7,0 60,23 60,30 53,30 0,7" fill="#FFFFFF"/>
      <polygon points="60,0 53,0 0,23 0,30 7,30 60,7" fill="#FFFFFF"/>
      <polygon points="0,0 4,0 60,26 60,30 56,30 0,4" fill="#C8102E"/>
      <polygon points="60,0 56,0 0,26 0,30 4,30 60,4" fill="#C8102E"/>
      <rect x="25" width="10" height="30" fill="#FFFFFF"/>
      <rect y="10" width="60" height="10" fill="#FFFFFF"/>
      <rect x="27" width="6" height="30" fill="#C8102E"/>
      <rect y="12" width="60" height="6" fill="#C8102E"/>
    </svg>
  </button>

</div>

  </div>

  <!-- PRESENTATION -->
<section class="profile">
  <div class="profile-photo">
    <img src="photo.jpg" alt="Photo profil">
  </div>

  <div class="profile-text">
    <p data-fr="Consultant Modern Workplace, spécialiste Intune (et tout ce qui à trait à la gestion des appareils en entreprise)"
       data-en="Modern Workplace Consultant, Intune specialist (as well as all device management linked subjects in Enterprise">
    </p>
	<div class="links">
      <a href="https://github.com/alaindespont">GitHub</a>
	<a href="https://www.linkedin.com/in/alain-philip-despont">Linkedin</a>
    </div>
  </div>

</section>
</header>

<nav class="filters">
  <button data-filter="all" class="active"
          data-fr="Tous les projets publics" data-en="All publics projects"></button>
  <button data-filter="powershell"
          data-fr="PowerShell" data-en="PowerShell"></button>
  <button data-filter="web"
          data-fr="Web" data-en="Web"></button>
  <button data-filter="docs"
          data-fr="Documents" data-en="Documents"></button>
</nav>

<main class="projects">

<!-- ARTICLE NORMAL -->
  <article class="project" data-category="powershell">
    <h3 data-fr="Titre du projet" data-en="Project title"></h3>
    <p class="description"
       data-fr="Resumé du projet"
       data-en="Summary of the project"></p>

    <div class="links">
      <a href="#">Lien vers le projet</a>
    </div>
  </article>

<!-- ARTICLE CONFIDENTIEL -->
  <article class="project private" data-category="powershell">
    <h3 data-fr="Projet d'entreprise" data-en="Enterprise project"></h3>
    <p class="description"
       data-fr="Projet d'un client"
       data-en="Client project"></p>

    <div class="private-line"
	data-fr="🔒 Confidentiel"
       data-en="🔒 Confidential">
</div>
  </article>

</main>

<footer class="footer">
  © Alain Philip Despont
</footer>

<script src="app.js"></script>
</body>
</html>
